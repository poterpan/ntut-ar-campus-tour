name: Build iOS → TestFlight

# main 上更動 unity-app/ 或 workflow 自身 → 自動跑 iOS build → TestFlight
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'unity-app/**'
      - '.github/workflows/build-ios.yml'

# 同分支連推多次只跑最新那次,舊的立刻取消
concurrency:
  group: build-ios-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_PATH: unity-app
  BUNDLE_ID: me.panspace.ntut-ar-campus-tour

# 兩段式架構(game-ci 官方推薦,省 macOS 分鐘數):
#   1. build(ubuntu, 1x 計費):Unity → Xcode 專案。Unity 的 iOS 目標只輸出
#      Xcode 專案(IL2CPP C++ 原始碼),這步不需要 macOS。
#   2. sign-upload(macos, 10x 計費):只跑非 macOS 不可的部分 —— xcodebuild
#      archive/export + TestFlight 上傳。
# 全程 macOS 約 20 分(200 等效分鐘)→ 拆分後約 14 macOS 分 + 10-15 ubuntu 分
# (~155 等效分鐘);Library cache miss 時省更多。
jobs:
  build:
    name: Unity → Xcode project
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      # GitHub Linux runner 預設只剩 ~14GB 可用,unityci 的 iOS Docker image 很大,
      # 清掉預裝雜物騰出 ~30GB(跟 build-android.yml 同 pattern)
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@v1.3.1  # pinned tag,避免 main 漂移 / 供應鏈攻擊
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: ${{ env.PROJECT_PATH }}/Library
          key: Library-iOS-${{ hashFiles(format('{0}/Packages/packages-lock.json', env.PROJECT_PATH), format('{0}/ProjectSettings/**', env.PROJECT_PATH)) }}
          restore-keys: |
            Library-iOS-
            Library-

      # LLM/語音 設定(含金鑰)不入版控,build 前由 secret 生成。
      # LLM、TTS(GLM)、STT(ElevenLabs)金鑰共用同一份 llm_config.json;缺哪個就該功能降級。
      - name: Write llm_config.json (from secrets)
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: |
          [ -z "$LLM_API_KEY" ] && echo "::warning::LLM_API_KEY 未設定 → LLM 對話降級為離線訊息"
          [ -z "$GLM_API_KEY" ] && echo "::warning::GLM_API_KEY 未設定 → TTS(語音念出)降級為靜默"
          [ -z "$ELEVENLABS_API_KEY" ] && echo "::warning::ELEVENLABS_API_KEY 未設定 → STT(語音輸入)停用"
          cat > "$PROJECT_PATH/Assets/StreamingAssets/llm_config.json" <<EOF
          {
              "apiBaseUrl": "https://testvideo.site/v1",
              "model": "gpt-5.5",
              "maxTokens": 500,
              "apiKey": "$LLM_API_KEY",
              "glmApiKey": "$GLM_API_KEY",
              "glmTtsUrl": "https://open.bigmodel.cn/api/paas/v4/audio/speech",
              "glmTtsModel": "glm-tts",
              "glmVoice": "xiaochen",
              "glmSpeed": 1.3,
              "elevenLabsApiKey": "$ELEVENLABS_API_KEY",
              "sttUrl": "https://api.elevenlabs.io/v1/speech-to-text",
              "sttModel": "scribe_v1"
          }
          EOF
          echo "llm_config.json written"

      - name: Unity → Xcode project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: ${{ env.PROJECT_PATH }}
          targetPlatform: iOS
          buildName: unity-app
          buildsPath: build
          versioning: None  # 用 Unity Player Settings 的 bundleVersion(目前 0.1.0),不讓 game-ci 自動算 0.0.X

      # Xcode 專案交棒給 macOS job;artifact 較大(IL2CPP 原始碼),retention 設最短
      - name: Upload Xcode project artifact
        uses: actions/upload-artifact@v4
        with:
          name: xcode-project-${{ github.run_number }}
          path: build/iOS
          retention-days: 1
          if-no-files-found: error

  sign-upload:
    name: Xcode archive + TestFlight Upload
    needs: build
    # macos-26 image 預設 Xcode 26.4.1 / iOS 26 SDK(Apple 從 2026 起強制要 iOS 26 SDK)
    # macos-latest 目前仍指 macos-15(default Xcode 16.4),不能用
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - name: Verify Xcode / SDK
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Download Xcode project artifact
        uses: actions/download-artifact@v4
        with:
          name: xcode-project-${{ github.run_number }}
          path: build/iOS

      # upload/download-artifact 不保留執行權限,補回 shell script 與 Unity 工具的 +x
      # (漏掉會在 xcodebuild 的 Run Script phase 噴 Permission denied)
      - name: Restore execute permissions
        run: |
          find build/iOS -type f -name "*.sh" -exec chmod +x {} \;
          find build/iOS -type f -iname "usymtool*" -exec chmod +x {} \;

      - name: Import code-signing cert (.p12)
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_DIST_SIGNING_KEY }}
          p12-password: ${{ secrets.IOS_DIST_SIGNING_KEY_PASSWORD }}

      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo -n "$PROFILE_BASE64" | base64 --decode > "$PROFILE_DIR/profile.mobileprovision"
          UUID=$(security cms -D -i "$PROFILE_DIR/profile.mobileprovision" | plutil -extract UUID raw -)
          echo "PROFILE_UUID=$UUID" >> $GITHUB_ENV
          echo "Installed profile UUID: $UUID"

      # Build number 由 Unity 端的 BuildNumberStamper 在 build 時自動蓋
      # (自 2026-01-01 起的分鐘數,單調遞增;本地與 CI 同一來源,永不撞號)。
      # 原本的 PlistBuddy bump(github.run_number)已移除——run_number 比分鐘數小,
      # 蓋回去會違反 TestFlight 的遞增規則。這裡只印出來確認:
      - name: Show CFBundleVersion (stamped by Unity)
        working-directory: build/iOS/unity-app
        run: |
          PLIST=$(find . -maxdepth 4 -name "Info.plist" \
            -not -path "*Pods*" \
            -not -path "*xcframework*" \
            -not -path "*UnityFramework*" \
            -not -path "*Frameworks*" \
            -print 2>/dev/null | head -1)
          if [ -z "$PLIST" ] || [ ! -f "$PLIST" ]; then
            echo "::error::找不到主 app 的 Info.plist"
            ls -la
            exit 1
          fi
          echo "Using: $PLIST"
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$PLIST"
          /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$PLIST" 2>/dev/null || echo "(無 CFBundleShortVersionString)"

      # ARCore Extensions 帶 CocoaPods 依賴時要先 pod install 才能讓 xcodebuild 找到。
      # Cloud Anchor 關掉後通常不會有 Podfile;走 .xcodeproj 路徑即可。
      - name: CocoaPods install (if Podfile present)
        working-directory: build/iOS/unity-app
        run: |
          if [ -f Podfile ]; then
            echo "::notice::Podfile 偵測到,執行 pod install"
            pod install --repo-update
            if [ ! -d "Unity-iPhone.xcworkspace" ]; then
              echo "::error::pod install 完成但 Unity-iPhone.xcworkspace 沒產出,build 無法繼續"
              ls -la
              exit 1
            fi
          else
            echo "::notice::Podfile 不存在(ARCore Cloud Anchor 已關 / 套件用 SPM),跳過 pod install,改走 .xcodeproj"
          fi

      - name: Create ExportOptions.plist
        env:
          TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          PROFILE_NAME: ${{ secrets.IOS_PROVISION_PROFILE_NAME }}
          BUNDLE_ID: ${{ env.BUNDLE_ID }}
        run: |
          # 改 manual signing + 指定我們已 install 的 profile
          # 因為 App Manager API Key 沒權限自動拿 profile(會踩 Cloud signing permission error)
          cat > "$GITHUB_WORKSPACE/ExportOptions.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>${TEAM_ID}</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>${BUNDLE_ID}</key>
                  <string>${PROFILE_NAME}</string>
              </dict>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>uploadBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF
          echo "--- ExportOptions.plist ---"
          cat "$GITHUB_WORKSPACE/ExportOptions.plist"

      - name: Build archive (.xcarchive)
        working-directory: build/iOS/unity-app
        run: |
          # 智能選 workspace / project:有 .xcworkspace 用之(CocoaPods),否則 .xcodeproj
          if [ -d "Unity-iPhone.xcworkspace" ]; then
            PROJECT_FLAG=("-workspace" "Unity-iPhone.xcworkspace")
            echo "::notice::Using Unity-iPhone.xcworkspace"
          elif [ -d "Unity-iPhone.xcodeproj" ]; then
            PROJECT_FLAG=("-project" "Unity-iPhone.xcodeproj")
            echo "::notice::Using Unity-iPhone.xcodeproj"
          else
            echo "::error::找不到 Unity-iPhone.xcworkspace 或 .xcodeproj"
            ls -la
            exit 1
          fi
          # archive 階段不簽名,簽名統一由 Export IPA 用 manual ExportOptions 處理:
          # - 不能用 Automatic + allowProvisioningUpdates:每個 runner 都是新 keychain,
          #   Xcode 會在 Apple 帳號上每次新建一張 Development 憑證,直到撐爆帳號上限
          # - 也不在這裡全域塞 PROVISIONING_PROFILE:會誤套到 UnityFramework 等子 target
          xcodebuild "${PROJECT_FLAG[@]}" \
            -scheme Unity-iPhone \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$GITHUB_WORKSPACE/build/unity-app.xcarchive" \
            archive \
            CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        id: export
        run: |
          # manual signing:cert(.p12)+ profile 都已裝在 runner 上,
          # 不需要也不可以 -allowProvisioningUpdates(避免再連 Apple API 建憑證)
          xcodebuild -exportArchive \
            -archivePath "$GITHUB_WORKSPACE/build/unity-app.xcarchive" \
            -exportPath "$GITHUB_WORKSPACE/build/export" \
            -exportOptionsPlist "$GITHUB_WORKSPACE/ExportOptions.plist"
          # 找實際 IPA(Unity Product Name 不一定等於 buildName)
          IPA=$(find "$GITHUB_WORKSPACE/build/export" -maxdepth 1 -name "*.ipa" -print -quit)
          if [ -z "$IPA" ]; then
            echo "::error::Export 完成但找不到 .ipa"
            ls -la "$GITHUB_WORKSPACE/build/export"
            exit 1
          fi
          echo "Found IPA: $IPA"
          echo "ipa_path=$IPA" >> "$GITHUB_OUTPUT"

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v4  # @v3 已被棄用,@v4 用 App Store Connect API backend
        with:
          app-path: ${{ steps.export.outputs.ipa_path }}
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}

      - name: Upload IPA + archive as artifact (debug 用)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-${{ github.run_number }}
          path: |
            build/export/*.ipa
            build/unity-app.xcarchive
          retention-days: 7
