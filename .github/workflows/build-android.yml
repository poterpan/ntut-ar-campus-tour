name: Build Android → GitHub Release

# 跟 iOS workflow 一樣,先手動觸發
on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  #   paths:
  #     - 'unity-app/**'
  #     - '.github/workflows/build-android.yml'

concurrency:
  group: build-android-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_PATH: unity-app

jobs:
  build:
    name: Unity Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      # GitHub Linux runner 預設只剩 ~14GB 可用,Unity Android Docker image 太大,
      # 清掉預裝雜物(Android SDK、.NET、Haskell、大型套件等)騰出 ~30GB
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@v1.3.1  # pinned tag,避免 main 漂移 / 供應鏈攻擊
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: ${{ env.PROJECT_PATH }}/Library
          key: Library-Android-${{ hashFiles(format('{0}/Packages/packages-lock.json', env.PROJECT_PATH), format('{0}/ProjectSettings/**', env.PROJECT_PATH)) }}
          restore-keys: |
            Library-Android-
            Library-

      - name: Unity build Android
        uses: game-ci/unity-builder@v4
        env:
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: ${{ env.PROJECT_PATH }}
          targetPlatform: Android
          buildName: unity-app
          buildsPath: build
          versioning: Semantic

      - name: Upload APK as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-${{ github.run_number }}
          path: build/Android/*.apk
          retention-days: 14

      - name: Publish to GitHub Release (pre-release)
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          name: Android Build #${{ github.run_number }}
          tag_name: android-build-${{ github.run_number }}
          prerelease: true
          files: build/Android/unity-app.apk
          body: |
            Auto-built Android APK from commit ${{ github.sha }}

            ⚠️ 目前 Geospatial 在 Android 上不會 work
            (還沒設定 Android-restricted GCP API key + release keystore 對齊 SHA-1)。
            這個 APK 適合測 AR 基本功能跟 UI,Geospatial 相關功能會失敗。
            完整 Android Geospatial 支援預計 W3/W4 處理。
